<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="听写小助手">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#2C8C99">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>听写小助手 · Dictation Buddy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
  :root{
    color-scheme: light;
    --paper:#F1F7F4;
    --paper-deep:#E7EFEA;
    --line:#B9CCC7;
    --line-soft:#D3E1DC;
    --ink:#1F3A5F;
    --ink-soft:#5A7690;
    --teal:#2C8C99;
    --teal-dark:#1F6B76;
    --yellow:#F4B740;
    --yellow-dark:#C98F1F;
    --coral:#F2685B;
    --coral-dark:#B8362C;
    --green:#2F9E55;
    --card:#FFFFFF;
    --shadow:rgba(31,58,95,0.16);
    --radius:20px;
    --font-display:"Nunito","Helvetica Neue",Arial,sans-serif;
    --font-body:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
    touch-action:manipulation;
  }
  input, textarea{
    -webkit-user-select:text;
    user-select:text;
  }
  body{
    min-height:100%;
    display:flex;
    flex-direction:column;
    background:var(--paper-deep);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(44,140,153,0.07), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(244,183,64,0.09), transparent 45%);
    font-family:var(--font-body);
    color:var(--ink);
    overscroll-behavior:none;
    -webkit-tap-highlight-color:transparent;
  }
  button, .dot, .mode-tab, canvas{
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
  }
  .screen{display:none; flex:1; flex-direction:column; padding:22px 16px 40px; max-width:760px; margin:0 auto; width:100%;}
  .screen.active{display:flex;}

  h1.title{font-family:var(--font-display); font-size:32px; margin:2px 0 2px; color:var(--ink); letter-spacing:0.3px;}
  .subtitle{color:var(--ink-soft); margin:0 0 20px; font-size:14.5px; line-height:1.5;}
  .app-version{margin-top:20px; text-align:center; color:var(--ink-soft); font-size:12.5px; opacity:0.75;}
  .sync-badge{display:inline-block;margin-left:8px;font-size:12px;vertical-align:middle;transition:color .3s;}
  .sync-badge.synced{color:var(--green);}
  .sync-badge.syncing{color:var(--yellow-dark);}
  .sync-badge.offline{color:var(--ink-soft);}

  .card{background:var(--card); border-radius:var(--radius); box-shadow:0 10px 24px var(--shadow); padding:16px 18px;}

  button{font-family:inherit; cursor:pointer; border:none; -webkit-appearance:none; background:none;}
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:11px 20px; border-radius:999px; font-size:15px; font-weight:700;
    background:var(--teal); color:#fff; box-shadow:0 4px 0 var(--teal-dark);
    transition:transform .06s;
    white-space:nowrap;
  }
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--teal-dark);}
  .btn.secondary{background:#fff; color:var(--ink); box-shadow:0 4px 0 var(--line);}
  .btn.secondary:active{box-shadow:0 1px 0 var(--line);}
  .btn.warn{background:var(--coral); color:#fff; box-shadow:0 4px 0 var(--coral-dark);}
  .btn.warn:active{box-shadow:0 1px 0 var(--coral-dark);}
  .btn.yellow{background:var(--yellow); color:#5c3d00; box-shadow:0 4px 0 var(--yellow-dark);}
  .btn.yellow:active{box-shadow:0 1px 0 var(--yellow-dark);}
  .btn-icon{width:46px;height:46px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:20px;padding:0;background:#fff;box-shadow:0 4px 0 var(--line);}
  .btn-icon:active{transform:translateY(3px); box-shadow:0 1px 0 var(--line);}
  .btn-icon.warn{box-shadow:0 4px 0 var(--coral-dark); background:#fff5f4;}

  button:focus-visible, input:focus-visible, textarea:focus-visible{outline:3px solid var(--yellow); outline-offset:2px;}

  /* ---- setup screen ---- */
  .mode-tabs{display:flex; gap:6px; margin-bottom:16px;}
  .mode-tab{flex:1; padding:11px 6px; border-radius:14px 14px 5px 5px; background:#dfe9e5; color:var(--ink-soft); font-weight:800; font-family:var(--font-display); font-size:15px; border:2px solid transparent; text-align:center;}
  .mode-tab.active{background:#fff; color:var(--ink); box-shadow:0 -3px 0 var(--teal) inset, 0 6px 14px var(--shadow);}

  .opts-card{margin-bottom:16px; display:flex; flex-direction:column; gap:12px;}
  .opts-card label{display:flex; align-items:center; gap:10px; font-size:16px;}
  .opts-card input[type=checkbox]{width:20px; height:20px; accent-color:var(--teal); flex-shrink:0;}

  .bank-list{display:flex; flex-direction:column; gap:12px; margin-bottom:18px;}
  .bank-card{background:#fff;border-radius:16px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 6px 14px var(--shadow); flex-wrap:wrap;}
  .bank-info .name{font-weight:800;font-size:16px;}
  .bank-info .count{color:var(--ink-soft);font-size:12.5px;margin-top:2px;}
  .bank-actions{display:flex; gap:6px; flex-wrap:wrap;}
  .bank-actions button{padding:9px 12px;border-radius:10px;font-size:13px;background:#eef3f1;color:var(--ink);font-weight:700;}
  .bank-actions button.start{background:var(--teal);color:#fff;}
  .bank-actions button.danger{background:#fde4e1;color:var(--coral-dark);}

  /* ---- modal ---- */
  .modal-overlay{position:fixed;inset:0;background:rgba(31,58,95,0.35);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal-overlay.active{display:flex;}
  .modal{background:#fff;border-radius:18px;padding:20px;max-width:480px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.25);}
  .modal h3{margin:0 0 14px;font-family:var(--font-display);font-size:22px;}
  .modal input[type=text], .modal textarea{width:100%;border:2px solid var(--line-soft);border-radius:12px;padding:10px 12px;font-size:15px;font-family:inherit;margin-bottom:12px;resize:vertical;}
  .modal textarea{min-height:140px; line-height:1.5;}
  .modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;}

  /* ---- practice screen ---- */
  .practice-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px;}
  #practice-title{font-family:var(--font-display); font-size:19px; text-align:center; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .progress-dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:6px 0 16px;}
  .dot{width:14px;height:14px;border-radius:50%;background:#dfe9e5;border:2px solid var(--line);padding:0;}
  .dot.current{background:var(--yellow);border-color:var(--yellow-dark);transform:scale(1.3);}
  .dot.done{background:var(--teal);border-color:var(--teal-dark);}

  .paper-wrap{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;touch-action:none;}
  .paper{
    position:relative;background:var(--paper);
    border-radius:14px; box-shadow:0 14px 30px var(--shadow);
    width:100%; max-width:680px; padding:16px 16px 12px 36px;
  }
  .spiral{position:absolute; left:8px; top:12px; bottom:12px; width:16px; display:flex; flex-direction:column; justify-content:space-between;}
  .spiral span{width:14px;height:14px;border-radius:50%;background:var(--paper-deep);box-shadow:inset 0 0 0 3px var(--card), 0 1px 2px rgba(0,0,0,0.15);}
  canvas{width:100%; height:260px; display:block; touch-action:none; border-radius:8px;}

  .reveal-word{text-align:center;font-family:var(--font-display);font-size:64px;color:var(--ink-soft);min-height:100px;margin-top:8px;line-height:1.15;}
  .reveal-word.hidden-text{visibility:hidden;}
  .reveal-word.latin-mode{font-family:var(--font-body);font-weight:700;letter-spacing:0.5px;}
  .reveal-word .reveal-pinyin{display:block;font-family:var(--font-body);font-weight:600;font-size:28px;color:var(--teal-dark);letter-spacing:0.5px;margin-bottom:4px;}
  .reveal-word .reveal-hanzi{display:block;font-size:64px;}

  .controls-row{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap;}

  /* ---- review screen ---- */
  .review-summary{background:#fff;border-radius:16px;padding:14px 18px;margin-bottom:16px;box-shadow:0 6px 14px var(--shadow);font-weight:700;text-align:center;}
  .review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:20px;}
  .review-card{background:#fff;border-radius:16px;padding:12px;box-shadow:0 6px 14px var(--shadow);position:relative;}
  .review-card .idx{position:absolute;top:8px;left:12px;font-family:var(--font-display);color:var(--ink-soft);font-size:14px;}
  .review-card img{width:100%;border-radius:10px;background:var(--paper);border:1px solid var(--line-soft);display:block;margin:4px 0 8px;}
  .review-word{font-weight:800;font-size:18px;text-align:center;margin:22px 0 8px;}
  .review-word .review-pinyin{display:block;font-weight:600;font-size:14px;color:var(--teal-dark);letter-spacing:0.5px;margin-top:2px;}
  .stamp{position:absolute;top:2px;right:8px;font-size:28px;transform:rotate(-10deg);display:none;}
  .stamp.correct{color:var(--green);}
  .stamp.wrong{color:var(--coral);}
  .mark-row{display:flex;gap:8px;}
  .mark-btn{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:700;background:#eef3f1;color:var(--ink);}
  .mark-btn.correct.active{background:var(--green);color:#fff;}
  .mark-btn.wrong.active{background:var(--coral);color:#fff;}
  .review-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .btn.green{background:var(--green);color:#fff;box-shadow:0 4px 0 #1e7a3e;}
  .btn.green:active{box-shadow:0 1px 0 #1e7a3e;}

  /* ---- history screen ---- */
  .hist-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
  .hist-card{background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 6px 14px var(--shadow);cursor:pointer;}
  .hist-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .hist-mode{font-size:20px;}
  .hist-meta{flex:1;}
  .hist-date{font-size:12.5px;color:var(--ink-soft);}
  .hist-name{font-weight:800;font-size:15px;margin:2px 0;}
  .hist-score{font-weight:700;font-size:14px;color:var(--ink-soft);}
  .hist-score.perfect{color:var(--green);}
  .hist-detail{margin-top:10px;display:none;flex-wrap:wrap;gap:6px;}
  .hist-card.open .hist-detail{display:flex;}
  .hist-chip{padding:5px 12px;border-radius:999px;font-size:14px;font-weight:600;}
  .hist-chip.correct{background:#e8f8ee;color:var(--green);}
  .hist-chip.wrong{background:#fde8e6;color:var(--coral-dark);}
  .hist-chip.unmarked{background:#eef3f1;color:var(--ink-soft);}
  .hist-empty{text-align:center;color:var(--ink-soft);padding:48px 0;font-size:17px;line-height:1.8;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

  @media print{
    @page{ margin:12mm; }
    html,body{ height:auto !important; overflow:visible !important; }
    body{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .screen{ display:none !important; }
    #screen-review{ display:block !important; position:static !important; max-width:100% !important; padding:0 !important; }
    .no-print{ display:none !important; }
  }
</style>
</head>
<body>

  <section id="screen-setup" class="screen active">
    <h1 class="title">听写小助手</h1>
    <p class="subtitle">用 Apple Pencil 在 iPad 上练习听写，中文、英文、马来文都可以。</p>

    <div class="mode-tabs">
      <button class="mode-tab" id="tab-cn">中文听写</button>
      <button class="mode-tab" id="tab-en">English</button>
      <button class="mode-tab" id="tab-ms">Bahasa M'sia</button>
    </div>

    <div class="card opts-card">
      <label><input type="checkbox" id="opt-shuffle" checked> 随机顺序出题 / Shuffle</label>
      <label><input type="checkbox" id="opt-slow"> 慢速朗读 / Slow speech</label>
      <label id="opt-pinyin-row"><input type="checkbox" id="opt-pinyin" checked> 拼音练习行（中文田字格上方加四线格）</label>
    </div>

    <div id="bank-list" class="bank-list"></div>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn yellow" id="btn-new-bank">➕ 新建词库</button>
      <button class="btn secondary" id="btn-history">📚 学习记录</button>
      <button class="btn secondary" id="btn-export">📤 备份词库</button>
      <button class="btn secondary" id="btn-import">📥 还原词库</button>
      <input type="file" id="import-file" accept=".json,application/json" style="display:none">
    </div>

    <div class="app-version" id="app-version"></div>
  </section>

  <section id="screen-practice" class="screen">
    <div class="practice-header">
      <button class="btn-icon" id="btn-exit" aria-label="返回首页">🏠</button>
      <div id="practice-title"></div>
      <button class="btn-icon" id="btn-reveal" aria-label="显示或隐藏题目文字">👁️</button>
    </div>
    <div class="progress-dots" id="progress-dots"></div>
    <div class="paper-wrap">
      <div class="paper">
        <div class="spiral" id="spiral"></div>
        <canvas id="canvas"></canvas>
      </div>
      <div class="reveal-word hidden-text" id="reveal-word"></div>
    </div>
    <div class="controls-row">
      <button class="btn-icon" id="btn-speak" aria-label="朗读题目">🔊</button>
      <button class="btn-icon" id="btn-undo" aria-label="撤销上一笔">↩️</button>
      <button class="btn-icon warn" id="btn-clear" aria-label="清空重写">🗑️</button>
      <button class="btn yellow" id="btn-next">下一题 ➡️</button>
    </div>
  </section>

  <section id="screen-review" class="screen">
    <h1 class="title">批改时间</h1>
    <p class="subtitle">家长可以点选下方按钮,批改孩子这次写的每一题。</p>
    <div class="review-summary" id="review-summary"></div>
    <div class="review-grid" id="review-grid"></div>
    <div class="review-actions no-print">
      <button class="btn green" id="btn-save-record">💾 保存记录</button>
      <button class="btn" id="btn-restart">🔄 打乱重来</button>
      <button class="btn secondary" id="btn-print">🖨️ 打印</button>
      <button class="btn secondary" id="btn-home">🏠 返回首页</button>
    </div>
  </section>

  <section id="screen-history" class="screen">
    <div class="practice-header" style="margin-bottom:16px;">
      <button class="btn-icon" id="btn-hist-home" aria-label="返回首页">🏠</button>
      <h2 style="font-family:var(--font-display);font-size:22px;margin:0;flex:1;text-align:center;">📚 学习记录</h2>
      <button class="btn-icon warn" id="btn-hist-clear" aria-label="清除所有记录">🗑️</button>
    </div>
    <div id="hist-list" class="hist-list"></div>
  </section>

  <div class="modal-overlay" id="bank-modal">
    <div class="modal">
      <h3 id="modal-title">新建词库</h3>
      <input type="text" id="modal-name" placeholder="词库名称,例如:三年级 第五课">
      <textarea id="modal-words" placeholder="每行输入一个词语,或用逗号分隔&#10;例如:&#10;苹果&#10;香蕉&#10;图书馆"></textarea>
      <div class="modal-actions">
        <button class="btn secondary" id="modal-cancel">取消</button>
        <button class="btn" id="modal-save">保存</button>
      </div>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
        integrity="sha384-sEVIly94UBRLKWdkYoPpSG7GD/e79YHMrxVyZaOk712Ga7+EAw6w1EFi+xBzBdd+"
        crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"
        integrity="sha384-M481iNZJtbpypKgvlvZ+78Giq0BsewFLk5r2k+MOcGXlwKCc27DQRZ+WCV/zpmpC"
        crossorigin="anonymous"></script>
<script src="pinyin-pro.min.js"></script>
<script>
(function(){
  const els = {
    tabCn: document.getElementById('tab-cn'),
    tabEn: document.getElementById('tab-en'),
    tabMs: document.getElementById('tab-ms'),
    optShuffle: document.getElementById('opt-shuffle'),
    optSlow: document.getElementById('opt-slow'),
    optPinyin: document.getElementById('opt-pinyin'),
    optPinyinRow: document.getElementById('opt-pinyin-row'),
    bankList: document.getElementById('bank-list'),
    appVersion: document.getElementById('app-version'),
    btnNewBank: document.getElementById('btn-new-bank'),
    btnHistory: document.getElementById('btn-history'),
    modalOverlay: document.getElementById('bank-modal'),
    modalTitle: document.getElementById('modal-title'),
    modalName: document.getElementById('modal-name'),
    modalWords: document.getElementById('modal-words'),
    modalSave: document.getElementById('modal-save'),
    modalCancel: document.getElementById('modal-cancel'),
    screens: {
      setup: document.getElementById('screen-setup'),
      practice: document.getElementById('screen-practice'),
      review: document.getElementById('screen-review'),
      history: document.getElementById('screen-history')
    },
    practiceTitle: document.getElementById('practice-title'),
    btnExit: document.getElementById('btn-exit'),
    btnReveal: document.getElementById('btn-reveal'),
    progressDots: document.getElementById('progress-dots'),
    spiral: document.getElementById('spiral'),
    canvas: document.getElementById('canvas'),
    revealWord: document.getElementById('reveal-word'),
    btnSpeak: document.getElementById('btn-speak'),
    btnUndo: document.getElementById('btn-undo'),
    btnClear: document.getElementById('btn-clear'),
    btnNext: document.getElementById('btn-next'),
    reviewSummary: document.getElementById('review-summary'),
    reviewGrid: document.getElementById('review-grid'),
    btnRestart: document.getElementById('btn-restart'),
    btnSaveRecord: document.getElementById('btn-save-record'),
    btnPrint: document.getElementById('btn-print'),
    btnHome: document.getElementById('btn-home'),
    histList: document.getElementById('hist-list'),
    btnHistHome: document.getElementById('btn-hist-home'),
    btnHistClear: document.getElementById('btn-hist-clear')
  };

  const COLOR = {
    ink: '#1F3A5F',
    line: '#B9CCC7',
    lineSoft: '#D3E1DC',
    margin: '#F2A79E'
  };

  const state = {
    mode: 'cn',
    banks: { cn: [], en: [], ms: [] },
    editingBankId: null,
    session: null
  };

  function defaultBanks(){
    return {
      cn: [{ id:'cn-sample', name:'示例词库 · 常用词语', words:['聪明','勇敢','仔细','认真','图书馆','运动会','高兴','难过','安静','热闹'] }],
      en: [{ id:'en-sample', name:'Sample Bank · Everyday Words', words:['apple','banana','orange','school','teacher','friend','happy','weather','garden','animal'] }],
      ms: [{ id:'ms-sample', name:'Contoh Bank · Kata Harian', words:['merah','biru','sekolah','murid','guru','buku','rajin','cantik','besar','kecil'] }]
    };
  }

  function uid(){ return 'b' + Date.now() + Math.floor(Math.random()*1000); }

  // 用 pinyin-pro 生成带声调的汉语拼音;库未加载时安全返回空串
  function getPinyin(text){
    if(typeof pinyinPro === 'undefined' || !pinyinPro.pinyin) return '';
    try{ return pinyinPro.pinyin(text, { toneType: 'symbol', type: 'string' }); }
    catch(e){ return ''; }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c];
    });
  }

  const STORAGE_KEY = 'dictation_wordbanks_v1';
  function loadBanks(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && parsed.cn && parsed.en){
          // 迁移：旧版本没有 ms，补上示例词库
          if(!parsed.ms) parsed.ms = defaultBanks().ms;
          state.banks = parsed;
          saveBanks();
          return;
        }
      }
    }catch(e){ /* 数据损坏或无法读取,回退到默认词库 */ }
    state.banks = defaultBanks();
    saveBanks();
  }
  function saveBanks(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.banks)); }
    catch(e){ console.error('保存词库失败', e); alert('词库保存失败：浏览器可能处于无痕模式或存储空间已满。'); }
    pushBanksToCloud();   // 同步到 Firestore（db 未就绪时为空操作）
  }

  // ---------- Setup screen ----------
  function setMode(mode){
    state.mode = mode;
    els.tabCn.classList.toggle('active', mode === 'cn');
    els.tabEn.classList.toggle('active', mode === 'en');
    els.tabMs.classList.toggle('active', mode === 'ms');
    // 拼音练习行选项只在中文模式下有意义
    els.optPinyinRow.style.display = mode === 'cn' ? '' : 'none';
    renderBankList();
  }

  function renderBankList(){
    const list = state.banks[state.mode] || [];
    els.bankList.innerHTML = '';
    if(list.length === 0){
      const empty = document.createElement('p');
      empty.className = 'subtitle';
      empty.textContent = state.mode === 'cn' ? '还没有词库，点击下方"新建词库"开始吧！' : 'No word banks yet. Tap "新建词库" below to create one.';
      els.bankList.appendChild(empty);
      return;
    }
    list.forEach(function(bank){
      const card = document.createElement('div');
      card.className = 'bank-card';
      card.innerHTML =
        '<div class="bank-info">' +
          '<div class="name">' + escapeHtml(bank.name) + '</div>' +
          '<div class="count">' + bank.words.length + (state.mode === 'cn' ? ' 个词语' : state.mode === 'ms' ? ' perkataan' : ' words') + '</div>' +
        '</div>' +
        '<div class="bank-actions">' +
          '<button class="start">▶️ 开始</button>' +
          '<button class="edit">✏️ 编辑</button>' +
          '<button class="danger">🗑️</button>' +
        '</div>';
      card.querySelector('.start').addEventListener('click', function(){ startSession(bank.id); });
      card.querySelector('.edit').addEventListener('click', function(){ openBankEditor(bank.id); });
      card.querySelector('.danger').addEventListener('click', function(){ deleteBank(bank.id); });
      els.bankList.appendChild(card);
    });
  }

  function openBankEditor(bankId){
    state.editingBankId = bankId;
    if(bankId){
      const bank = state.banks[state.mode].find(function(b){ return b.id === bankId; });
      els.modalTitle.textContent = '编辑词库';
      els.modalName.value = bank.name;
      els.modalWords.value = bank.words.join('\n');
    } else {
      els.modalTitle.textContent = '新建词库';
      els.modalName.value = '';
      els.modalWords.value = '';
    }
    els.modalOverlay.classList.add('active');
    setTimeout(function(){ els.modalName.focus(); }, 50);
  }
  function closeBankEditor(){
    els.modalOverlay.classList.remove('active');
    state.editingBankId = null;
  }
  function saveBankEditor(){
    const name = els.modalName.value.trim();
    const words = els.modalWords.value.split(/[\n,，、]+/).map(function(w){ return w.trim(); }).filter(Boolean);
    if(!name){ alert('请输入词库名称'); return; }
    if(words.length === 0){ alert('请至少输入一个词语'); return; }
    if(state.editingBankId){
      const bank = state.banks[state.mode].find(function(b){ return b.id === state.editingBankId; });
      bank.name = name; bank.words = words;
    } else {
      state.banks[state.mode].push({ id: uid(), name: name, words: words });
    }
    saveBanks();
    renderBankList();
    closeBankEditor();
  }
  function deleteBank(bankId){
    const bank = state.banks[state.mode].find(function(b){ return b.id === bankId; });
    if(!bank) return;
    if(!confirm('确定要删除词库《' + bank.name + '》吗?')) return;
    state.banks[state.mode] = state.banks[state.mode].filter(function(b){ return b.id !== bankId; });
    saveBanks();
    renderBankList();
  }

  // ---------- Session / Practice ----------
  function showScreen(name){
    Object.keys(els.screens).forEach(function(k){ els.screens[k].classList.remove('active'); });
    els.screens[name].classList.add('active');
  }

  function shuffled(arr){
    const a = arr.slice();
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function startSession(bankId){
    const bank = state.banks[state.mode].find(function(b){ return b.id === bankId; });
    if(!bank) return;
    const words = els.optShuffle.checked ? shuffled(bank.words) : bank.words.slice();
    state.session = {
      mode: state.mode,
      pinyin: els.optPinyin.checked,
      bankId: bank.id,
      bankName: bank.name,
      words: words,
      current: 0,
      results: words.map(function(w){ return { word: w, image: null, marked: null }; })
    };
    showScreen('practice');
    els.practiceTitle.textContent = bank.name;
    renderDots();
    loadQuestion(0);
  }

  function renderDots(){
    els.progressDots.innerHTML = '';
    state.session.words.forEach(function(w, i){
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === state.session.current ? ' current' : '') + (state.session.results[i].image ? ' done' : '');
      dot.setAttribute('aria-label', '第 ' + (i + 1) + ' 题');
      dot.addEventListener('click', function(){ jumpTo(i); });
      els.progressDots.appendChild(dot);
    });
  }

  function jumpTo(index){
    if(index === state.session.current) return;
    saveCurrentCanvas();
    state.session.current = index;
    renderDots();
    loadQuestion(index);
  }

  let ctx, strokes = [], activePointerId = null, isDrawing = false, currentStroke = null, dpr = 1;
  let curCssW = 0, curCssH = 0;   // 当前画布 CSS 尺寸,旋转时用于缩放已写笔迹
  let penDetected = false;   // 一旦检测到 Apple Pencil,画布将忽略手指/手掌触摸

  function shouldRejectPointer(e){
    if(e.pointerType === 'pen'){ penDetected = true; return false; }
    if(e.pointerType === 'touch' && penDetected) return true;   // 手掌/手指防误触
    return false;
  }

  function loadQuestion(index){
    const word = state.session.words[index];
    const isCn = state.session.mode === 'cn';
    els.revealWord.classList.toggle('latin-mode', !isCn);
    if(isCn){
      const py = getPinyin(word);
      els.revealWord.innerHTML =
        (py ? '<span class="reveal-pinyin">' + escapeHtml(py) + '</span>' : '') +
        '<span class="reveal-hanzi">' + escapeHtml(word) + '</span>';
    } else {
      els.revealWord.textContent = word;
    }
    els.revealWord.classList.add('hidden-text');
    strokes = [];
    setupCanvas(word);
    speakCurrent();
    updateNextButtonLabel();
  }

  function updateNextButtonLabel(){
    const isLast = state.session.current === state.session.words.length - 1;
    els.btnNext.textContent = isLast ? '✅ 完成听写' : '下一题 ➡️';
  }

  function setupCanvas(word){
    const canvas = els.canvas;
    const rect = canvas.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    const cssW = rect.width || canvas.parentElement.clientWidth;
    const usePinyin = state.session.mode === 'cn' && state.session.pinyin;
    const cssH = usePinyin ? 300 : 260;
    canvas.style.height = cssH + 'px';
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx = canvas.getContext('2d', { desynchronized: true });
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    curCssW = cssW; curCssH = cssH;
    drawGrid(word, cssW, cssH);
  }

  // 田字格：方框 + 虚线十字辅助线
  function drawCharBox(x, y, size){
    ctx.setLineDash([]);
    ctx.strokeStyle = COLOR.line;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x, y, size, size);
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = COLOR.lineSoft;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x + size / 2, y); ctx.lineTo(x + size / 2, y + size);
    ctx.moveTo(x, y + size / 2); ctx.lineTo(x + size, y + size / 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 拼音四线三格：四条横线分出三格,第三条为书写基线;两侧加淡竖线框住
  function drawPinyinGrid(x, y, w, hh){
    const rowH = hh / 3;
    for(let k = 0; k <= 3; k++){
      const ly = y + k * rowH;
      const outer = (k === 0 || k === 3);
      const baseline = (k === 2);
      ctx.setLineDash(baseline || outer ? [] : [4, 4]);
      ctx.strokeStyle = baseline ? COLOR.line : COLOR.lineSoft;
      ctx.lineWidth = baseline ? 1.5 : 1.1;
      ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(x + w, ly); ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.strokeStyle = COLOR.lineSoft;
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(x, y + hh);
    ctx.moveTo(x + w, y); ctx.lineTo(x + w, y + hh);
    ctx.stroke();
  }

  function drawGrid(word, w, h){
    ctx.clearRect(0, 0, w, h);
    if(state.session.mode === 'cn'){
      const n = Math.max(1, Array.from(word).length);
      const boxSize = Math.max(56, Math.min(150, (w - 32) / n));
      const totalW = boxSize * n;
      const startX = (w - totalW) / 2;
      const usePinyin = !!state.session.pinyin;
      const pinyinH = usePinyin ? boxSize * 0.55 : 0;
      const gap = usePinyin ? 8 : 0;
      const columnH = pinyinH + gap + boxSize;
      const startY = Math.max(6, (h - columnH) / 2);
      for(let i = 0; i < n; i++){
        const x = startX + i * boxSize;
        if(usePinyin) drawPinyinGrid(x, startY, boxSize, pinyinH);
        drawCharBox(x, startY + pinyinH + gap, boxSize);
      }
    } else {
      const marginX = 32;
      const top = h * 0.22, mid = h * 0.5, base = h * 0.72, desc = h * 0.92;
      ctx.setLineDash([]);
      ctx.strokeStyle = COLOR.margin;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(marginX - 14, top - 10); ctx.lineTo(marginX - 14, desc + 10); ctx.stroke();
      const lines = [[top, false], [mid, true], [base, false], [desc, true]];
      lines.forEach(function(pair){
        const y = pair[0], dashed = pair[1];
        ctx.setLineDash(dashed ? [5, 5] : []);
        ctx.strokeStyle = dashed ? COLOR.lineSoft : COLOR.line;
        ctx.lineWidth = dashed ? 1.2 : 1.6;
        ctx.beginPath(); ctx.moveTo(marginX, y); ctx.lineTo(w - 16, y); ctx.stroke();
      });
      ctx.setLineDash([]);
    }
  }

  function redrawAll(){
    const canvas = els.canvas;
    const cssW = canvas.width / dpr, cssH = canvas.height / dpr;
    const word = state.session.words[state.session.current];
    drawGrid(word, cssW, cssH);
    strokes.forEach(drawSmoothStroke);
  }

  // ---- 笔迹渲染:二次贝塞尔平滑(中/英/马来文共用) ----
  function strokeWidth(p){ return 2.4 + ((p && p.p) || 0.5) * 4; }
  function mid(a, b){ return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }
  function inkStart(w){
    ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = COLOR.ink;
  }
  function inkLine(ax, ay, bx, by, w){
    inkStart(w); ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
  }
  function inkQuad(ax, ay, cx, cy, bx, by, w){
    inkStart(w); ctx.beginPath(); ctx.moveTo(ax, ay); ctx.quadraticCurveTo(cx, cy, bx, by); ctx.stroke();
  }
  function inkDot(p){
    ctx.beginPath(); ctx.arc(p.x, p.y, strokeWidth(p) / 2, 0, Math.PI * 2);
    ctx.fillStyle = COLOR.ink; ctx.fill();
  }

  // 实时:每来一个新点,画出到该点为止新增的那一段平滑曲线
  function drawStrokeIncrement(s){
    const n = s.length;
    if(n === 2){
      const m = mid(s[0], s[1]);
      inkLine(s[0].x, s[0].y, m.x, m.y, strokeWidth(s[1]));
    } else if(n >= 3){
      const p1 = s[n - 2], p2 = s[n - 1];
      const m1 = mid(s[n - 3], p1), m2 = mid(p1, p2);
      inkQuad(m1.x, m1.y, p1.x, p1.y, m2.x, m2.y, strokeWidth(p2));
    }
  }
  // 抬笔:补画最后一小段到真正的终点(单点则画一个圆点)
  function finishStrokeDraw(s){
    if(!s) return;
    const n = s.length;
    if(n === 1){ inkDot(s[0]); }
    else if(n >= 2){
      const m = mid(s[n - 2], s[n - 1]);
      inkLine(m.x, m.y, s[n - 1].x, s[n - 1].y, strokeWidth(s[n - 1]));
    }
  }
  // 整条重绘(撤销、旋转后使用),与实时绘制保持一致的形状
  function drawSmoothStroke(s){
    const n = s.length;
    if(n === 0) return;
    if(n === 1){ inkDot(s[0]); return; }
    const m01 = mid(s[0], s[1]);
    inkLine(s[0].x, s[0].y, m01.x, m01.y, strokeWidth(s[1]));
    for(let i = 2; i < n; i++){
      const p1 = s[i - 1];
      const m1 = mid(s[i - 2], p1), m2 = mid(p1, s[i]);
      inkQuad(m1.x, m1.y, p1.x, p1.y, m2.x, m2.y, strokeWidth(s[i]));
    }
    const mL = mid(s[n - 2], s[n - 1]);
    inkLine(mL.x, mL.y, s[n - 1].x, s[n - 1].y, strokeWidth(s[n - 1]));
  }

  function getPos(e){
    const rect = els.canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top, p: e.pressure > 0 ? e.pressure : 0.5 };
  }

  els.canvas.addEventListener('pointerdown', function(e){
    e.preventDefault();
    if(shouldRejectPointer(e)) return;
    // Pencil 落笔时,若手掌已抢先开始了一条 touch 笔画,立即中止并让位给 Pencil
    if(e.pointerType === 'pen' && isDrawing && activePointerId !== null){
      isDrawing = false; activePointerId = null; currentStroke = null;
    }
    if(activePointerId !== null) return;
    activePointerId = e.pointerId;
    try{ els.canvas.setPointerCapture(e.pointerId); }catch(err){}
    isDrawing = true;
    currentStroke = [getPos(e)];
    strokes.push(currentStroke);
  });
  els.canvas.addEventListener('pointermove', function(e){
    if(!isDrawing || e.pointerId !== activePointerId) return;
    // Safari 会把 Apple Pencil 的高频移动合并成一次事件;取回全部中间点,笔画才连续不断
    const points = (typeof e.getCoalescedEvents === 'function') ? e.getCoalescedEvents() : null;
    const list = (points && points.length) ? points : [e];
    for(let k = 0; k < list.length; k++){
      currentStroke.push(getPos(list[k]));
      drawStrokeIncrement(currentStroke);
    }
    e.preventDefault();
  });
  function endStroke(e){
    if(e.pointerId !== activePointerId) return;
    finishStrokeDraw(currentStroke);   // 补画最后一小段,笔画收尾完整
    isDrawing = false; activePointerId = null; currentStroke = null;
  }
  els.canvas.addEventListener('pointerup', endStroke);
  els.canvas.addEventListener('pointercancel', endStroke);
  els.canvas.addEventListener('pointerleave', endStroke);

  function saveCurrentCanvas(){
    const idx = state.session.current;
    state.session.results[idx].image = els.canvas.toDataURL('image/png');
  }

  // ---------- Speech ----------
  let voicesCache = [];
  function loadVoices(){ voicesCache = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
  if('speechSynthesis' in window){
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  function pickVoice(lang){
    return voicesCache.find(function(v){ return v.lang === lang; }) ||
           voicesCache.find(function(v){ return v.lang && v.lang.indexOf(lang.slice(0,2)) === 0; }) ||
           null;
  }
  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const lang = state.session.mode === 'cn' ? 'zh-CN' : state.session.mode === 'ms' ? 'ms-MY' : 'en-US';
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    const v = pickVoice(lang);
    if(v) utter.voice = v;
    utter.rate = els.optSlow.checked ? 0.55 : 0.85;
    window.speechSynthesis.speak(utter);
  }
  function speakCurrent(){ speak(state.session.words[state.session.current]); }

  // ---------- Practice controls ----------
  els.btnSpeak.addEventListener('click', speakCurrent);
  els.btnUndo.addEventListener('click', function(){ strokes.pop(); redrawAll(); });
  els.btnClear.addEventListener('click', function(){ strokes = []; redrawAll(); });
  els.btnReveal.addEventListener('click', function(){ els.revealWord.classList.toggle('hidden-text'); });
  els.btnExit.addEventListener('click', function(){
    if(confirm('要退出本次听写吗?这次的内容将不会进入批改页面。')){
      if('speechSynthesis' in window) window.speechSynthesis.cancel();
      showScreen('setup');
    }
  });
  els.btnNext.addEventListener('click', function(){
    saveCurrentCanvas();
    const isLast = state.session.current === state.session.words.length - 1;
    if(isLast){
      finishSession();
    } else {
      state.session.current++;
      renderDots();
      loadQuestion(state.session.current);
    }
  });

  // ---------- Review ----------
  function finishSession(){
    if('speechSynthesis' in window) window.speechSynthesis.cancel();
    showScreen('review');
    renderReview();
  }
  function renderReview(){
    const results = state.session.results;
    els.reviewGrid.innerHTML = '';
    results.forEach(function(r, i){
      const card = document.createElement('div');
      card.className = 'review-card';
      const rpy = state.session.mode === 'cn' ? getPinyin(r.word) : '';
      card.innerHTML =
        '<div class="idx">#' + (i + 1) + '</div>' +
        '<div class="stamp"></div>' +
        '<div class="review-word">' + escapeHtml(r.word) +
          (rpy ? '<span class="review-pinyin">' + escapeHtml(rpy) + '</span>' : '') +
        '</div>' +
        '<img src="' + (r.image || '') + '" alt="孩子写的 ' + escapeHtml(r.word) + '">' +
        '<div class="mark-row no-print">' +
          '<button class="mark-btn correct">✓ 正确</button>' +
          '<button class="mark-btn wrong">✗ 待加强</button>' +
        '</div>';
      const stamp = card.querySelector('.stamp');
      const bCorrect = card.querySelector('.correct');
      const bWrong = card.querySelector('.wrong');
      function refresh(){
        bCorrect.classList.toggle('active', r.marked === true);
        bWrong.classList.toggle('active', r.marked === false);
        if(r.marked === true){ stamp.textContent = '✓'; stamp.className = 'stamp correct'; stamp.style.display = 'block'; }
        else if(r.marked === false){ stamp.textContent = '✗'; stamp.className = 'stamp wrong'; stamp.style.display = 'block'; }
        else { stamp.style.display = 'none'; }
        updateSummary();
      }
      bCorrect.addEventListener('click', function(){ r.marked = r.marked === true ? null : true; refresh(); });
      bWrong.addEventListener('click', function(){ r.marked = r.marked === false ? null : false; refresh(); });
      refresh();
      els.reviewGrid.appendChild(card);
    });
    updateSummary();
  }
  function updateSummary(){
    const results = state.session.results;
    const marked = results.filter(function(r){ return r.marked !== null; });
    const correct = results.filter(function(r){ return r.marked === true; }).length;
    els.reviewSummary.textContent = marked.length === results.length
      ? ('批改完成 · 正确 ' + correct + ' / ' + results.length)
      : ('已批改 ' + marked.length + ' / ' + results.length + ' 题 · 点击图片下方按钮继续批改');
  }

  // ---------- Study History ----------
  const HISTORY_KEY = 'dictation_history_v1';
  function loadHistory(){
    try{ const r = localStorage.getItem(HISTORY_KEY); return r ? JSON.parse(r) : []; }
    catch(e){ return []; }
  }
  function saveHistory(history){
    try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }catch(e){}
  }
  function appendSessionToHistory(){
    const s = state.session;
    if(!s) return;
    const entry = {
      id: uid(),
      date: new Date().toISOString(),
      mode: s.mode,
      bankName: s.bankName,
      results: s.results.map(function(r){ return { word: r.word, marked: r.marked }; })
    };
    const history = loadHistory();
    history.unshift(entry);
    if(history.length > 200) history.length = 200;
    saveHistory(history);
    saveSessionToCloud(entry);   // 同步到 Firestore
  }
  function modeLabel(m){ return m === 'cn' ? '🇨🇳 中文' : m === 'ms' ? '🇲🇾 马来文' : '🇬🇧 English'; }
  function renderHistory(){
    els.histList.innerHTML = '<p class="subtitle" style="text-align:center;padding:20px 0">加载中…</p>';
    loadHistoryFromCloud(function(cloudRecords){
      const history = cloudRecords !== null ? cloudRecords : loadHistory();
      // 用云端记录刷新本地缓存
      if(cloudRecords !== null) saveHistory(cloudRecords);
      _renderHistoryList(history);
    });
  }

  function _renderHistoryList(history){
    els.histList.innerHTML = '';
    if(!history.length){
      const div = document.createElement('div');
      div.className = 'hist-empty';
      div.innerHTML = '还没有保存过任何学习记录。<br>批改完成后点击「保存记录」即可。';
      els.histList.appendChild(div);
      return;
    }
    history.forEach(function(entry){
      const total = entry.results.length;
      const correct = entry.results.filter(function(r){ return r.marked === true; }).length;
      const marked = entry.results.filter(function(r){ return r.marked !== null; }).length;
      const d = new Date(entry.date);
      const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') +
        '  ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      const card = document.createElement('div');
      card.className = 'hist-card';
      const scoreClass = (marked === total && correct === total) ? 'hist-score perfect' : 'hist-score';
      const scoreText = marked === total
        ? '正确 ' + correct + ' / ' + total + (correct === total ? ' 🌟' : '')
        : '已批改 ' + marked + ' / ' + total;
      card.innerHTML =
        '<div class="hist-head">' +
          '<span class="hist-mode">' + modeLabel(entry.mode) + '</span>' +
          '<div class="hist-meta">' +
            '<div class="hist-date">' + escapeHtml(dateStr) + '</div>' +
            '<div class="hist-name">' + escapeHtml(entry.bankName) + '</div>' +
          '</div>' +
          '<span class="' + scoreClass + '">' + scoreText + '</span>' +
        '</div>' +
        '<div class="hist-detail">' +
          entry.results.map(function(r){
            const cls = r.marked === true ? 'correct' : r.marked === false ? 'wrong' : 'unmarked';
            const mark = r.marked === true ? ' ✓' : r.marked === false ? ' ✗' : '';
            return '<span class="hist-chip ' + cls + '">' + escapeHtml(r.word) + mark + '</span>';
          }).join('') +
        '</div>';
      card.addEventListener('click', function(){ card.classList.toggle('open'); });
      els.histList.appendChild(card);
    });
  }
  els.btnSaveRecord.addEventListener('click', function(){
    appendSessionToHistory();
    alert('✅ 记录已保存！可在首页「📚 学习记录」查看。');
  });
  els.btnHistory.addEventListener('click', function(){
    renderHistory();
    showScreen('history');
  });
  els.btnHistHome.addEventListener('click', function(){ showScreen('setup'); });
  els.btnHistClear.addEventListener('click', function(){
    if(!confirm('确定要清除全部学习记录吗？此操作无法还原。')) return;
    saveHistory([]);
    clearHistoryFromCloud(function(){ renderHistory(); });
  });

  els.btnRestart.addEventListener('click', function(){
    const words = shuffled(state.session.words);
    state.session = {
      mode: state.session.mode,
      pinyin: state.session.pinyin,
      bankId: state.session.bankId,
      bankName: state.session.bankName,
      words: words,
      current: 0,
      results: words.map(function(w){ return { word: w, image: null, marked: null }; })
    };
    showScreen('practice');
    els.practiceTitle.textContent = state.session.bankName;
    renderDots();
    loadQuestion(0);
  });
  els.btnPrint.addEventListener('click', function(){
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if(isIOS){ openIOSPrintWindow(); } else { window.print(); }
  });
  function openIOSPrintWindow(){
    var summaryEl = document.getElementById('review-summary');
    var gridEl    = document.getElementById('review-grid');
    var css =
      'body{font-family:Arial,Helvetica,sans-serif;padding:16px;color:#1F3A5F;}' +
      'h1{font-size:22px;margin:0 0 4px;}' +
      '.sub{margin:0 0 16px;color:#5A7690;font-size:13px;}' +
      '.review-summary{background:#f5f9f7;border:1px solid #dce8e4;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-weight:700;text-align:center;font-size:15px;}' +
      '.review-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}' +
      '.review-card{border:1px solid #ccc;border-radius:8px;padding:10px;position:relative;background:#fff;}' +
      '.idx{font-size:12px;color:#5A7690;margin-bottom:2px;}' +
      '.review-word{font-weight:800;font-size:16px;text-align:center;margin:4px 0 8px;}' +
      '.review-word .review-pinyin{display:block;font-size:12px;color:#1F6B76;font-weight:600;margin-top:2px;}' +
      'img{width:100%;border-radius:6px;border:1px solid #ddd;display:block;margin-bottom:6px;}' +
      '.mark-row{display:none !important;}' +
      '.stamp{position:absolute;top:4px;right:8px;font-size:26px;transform:rotate(-10deg);}' +
      '.stamp.correct{color:#2F9E55;}.stamp.wrong{color:#F2685B;}' +
      '.hint{text-align:center;color:#999;font-size:13px;margin-top:24px;border-top:1px solid #eee;padding-top:12px;}' +
      '@media print{.hint{display:none;}}';
    var body =
      '<h1>批改时间</h1>' +
      '<p class="sub">听写小助手 · Dictation Buddy</p>' +
      '<div class="review-summary">' + summaryEl.innerHTML + '</div>' +
      '<div class="review-grid">' + gridEl.innerHTML + '</div>' +
      '<p class="hint">点右上角「分享」按钮 → 选择「打印」即可打印 ↗️</p>';
    var w = window.open('', '_blank', 'noopener');
    if(!w){ alert('请允许弹出窗口，或使用右上角「分享 → 打印」功能直接打印本页。'); return; }
    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">' +
      '<meta name="viewport" content="width=device-width,initial-scale=1">' +
      '<title>批改时间 · 听写小助手</title>' +
      '<style>' + css + '</style></head><body>' + body + '</body></html>');
    w.document.close();
  }
  els.btnHome.addEventListener('click', function(){ showScreen('setup'); });

  // ---------- Modal & mode wiring ----------
  els.btnNewBank.addEventListener('click', function(){ openBankEditor(null); });
  els.modalSave.addEventListener('click', saveBankEditor);
  els.modalCancel.addEventListener('click', closeBankEditor);
  els.tabCn.addEventListener('click', function(){ setMode('cn'); });
  els.tabEn.addEventListener('click', function(){ setMode('en'); });
  els.tabMs.addEventListener('click', function(){ setMode('ms'); });

  // ---------- Backup / Restore ----------
  document.getElementById('btn-export').addEventListener('click', function(){
    const blob = new Blob([JSON.stringify(state.banks, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const d = new Date();
    a.download = 'dictation-wordbanks-' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 500);
  });
  document.getElementById('btn-import').addEventListener('click', function(){
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(){
      try{
        const parsed = JSON.parse(reader.result);
        if(!parsed || !Array.isArray(parsed.cn) || !Array.isArray(parsed.en)){
          alert('文件格式不正确，请选择之前用"备份词库"导出的 JSON 文件。');
          return;
        }
        if(!confirm('还原将覆盖当前所有词库，确定继续吗？')) return;
        if(!parsed.ms) parsed.ms = [];
        state.banks = parsed;
        saveBanks();
        renderBankList();
        alert('词库还原成功!');
      }catch(err){
        alert('无法读取该文件,请确认它是有效的 JSON 备份文件。');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // 练习页面上阻止手掌触摸引发的滚动、选择与长按高亮
  ['touchstart','touchmove'].forEach(function(evt){
    document.addEventListener(evt, function(e){
      if(els.screens.practice.classList.contains('active')){
        // 保留按钮点击,其余触摸一律拦截
        if(!e.target.closest('button')) e.preventDefault();
      }
    }, { passive:false });
  });

  for(let i = 0; i < 9; i++){ els.spiral.appendChild(document.createElement('span')); }

  // 屏幕尺寸/方向变化时,保留已写笔迹并按新旧画布尺寸缩放,避免旋转后写的字消失
  function handleViewportChange(){
    if(!(els.screens.practice.classList.contains('active') && state.session)) return;
    const oldW = curCssW, oldH = curCssH;
    setupCanvas(state.session.words[state.session.current]);   // 会更新 curCssW/curCssH
    if(oldW && oldH && (oldW !== curCssW || oldH !== curCssH)){
      const sx = curCssW / oldW, sy = curCssH / oldH;
      strokes.forEach(function(st){
        st.forEach(function(pt){ pt.x *= sx; pt.y *= sy; });
      });
    }
    redrawAll();
  }
  let resizeTimer;
  function scheduleViewportChange(delay){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(handleViewportChange, delay);
  }
  window.addEventListener('resize', function(){ scheduleViewportChange(250); });
  window.addEventListener('orientationchange', function(){ scheduleViewportChange(300); });

  // 应用版本号(同时更新 version.txt / sw.js 的 CACHE)
  const APP_VERSION = '0.5';
  els.appVersion.innerHTML = '版本 v' + APP_VERSION +
    '&nbsp;&nbsp;<span id="sync-status" class="sync-badge offline">📴 本地模式</span>';

  // ============================================================
  // Firebase Firestore 云端同步
  // 离线时自动降级为纯 localStorage 模式,不影响正常使用
  // ============================================================
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAevxjT1xNHmXIDUQk8V4ZX0r2GxuZVH8M",
    authDomain: "dictationdb.firebaseapp.com",
    projectId: "dictationdb",
    storageBucket: "dictationdb.firebasestorage.app",
    messagingSenderId: "676161076844",
    appId: "1:676161076844:web:4557ca281f9b092c5f6249"
  };

  let db = null;
  let banksUnsub = null;   // onSnapshot 取消订阅函数

  function syncStatus(state){
    const el = document.getElementById('sync-status');
    if(!el) return;
    if(state === 'synced')  { el.textContent = '☁️ 已同步';  el.className = 'sync-badge synced';  }
    else if(state === 'syncing'){ el.textContent = '🔄 同步中…'; el.className = 'sync-badge syncing'; }
    else                    { el.textContent = '📴 本地模式'; el.className = 'sync-badge offline'; }
  }

  function pushBanksToCloud(){
    if(!db) return;
    syncStatus('syncing');
    db.collection('wordbanks').doc('main').set({
      cn: state.banks.cn,
      en: state.banks.en,
      ms: state.banks.ms,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){ syncStatus('synced'); })
      .catch(function(e){ console.warn('Firestore write:', e); syncStatus('offline'); });
  }

  function startBanksListener(){
    if(!db) return;
    if(banksUnsub) banksUnsub();
    syncStatus('syncing');
    banksUnsub = db.collection('wordbanks').doc('main').onSnapshot(
      function(snap){
        if(!snap.exists){ pushBanksToCloud(); return; }
        const remote = snap.data();
        // 用远端数据更新本地(最后写入者优先)
        if(Array.isArray(remote.cn)) state.banks.cn = remote.cn;
        if(Array.isArray(remote.en)) state.banks.en = remote.en;
        if(Array.isArray(remote.ms)) state.banks.ms = remote.ms;
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.banks)); }catch(e){}
        renderBankList();
        syncStatus('synced');
      },
      function(err){ console.warn('Firestore listen:', err); syncStatus('offline'); }
    );
  }

  function saveSessionToCloud(entry){
    if(!db) return;
    db.collection('history').add({
      date: entry.date,
      mode: entry.mode,
      bankName: entry.bankName,
      results: entry.results,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(e){ console.warn('History sync:', e); });
  }

  function loadHistoryFromCloud(callback){
    if(!db){ callback(null); return; }
    db.collection('history')
      .orderBy('createdAt', 'desc')
      .limit(200)
      .get()
      .then(function(snap){
        callback(snap.docs.map(function(d){
          const rec = d.data();
          rec.id = d.id;
          // Firestore Timestamp → ISO string
          if(rec.createdAt && rec.createdAt.toDate) rec.date = rec.date || rec.createdAt.toDate().toISOString();
          return rec;
        }));
      })
      .catch(function(e){ console.warn('History load:', e); callback(null); });
  }

  function clearHistoryFromCloud(done){
    if(!db){ done(); return; }
    db.collection('history').get()
      .then(function(snap){
        if(snap.empty){ done(); return; }
        const batch = db.batch();
        snap.docs.forEach(function(d){ batch.delete(d.ref); });
        return batch.commit();
      })
      .then(done)
      .catch(function(e){ console.warn('History clear:', e); done(); });
  }

  function initFirebase(){
    if(typeof firebase === 'undefined'){ syncStatus('offline'); return; }
    try{
      if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      startBanksListener();
    }catch(e){ console.warn('Firebase init:', e); syncStatus('offline'); }
  }

  loadBanks();
  setMode('cn');
  initFirebase();
})();
</script>
<script>
  // 注册 Service Worker,实现离线可用(添加到主屏幕后无网也能打开)
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(err){
        console.warn('Service Worker 注册失败', err);
      });
    });
  }
</script>
</body>
</html>
